services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: speech-translation-backend
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env
    volumes:
      - ../backend:/app
      - ../stt.json:/app/stt.json:ro
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: speech-translation-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_WS_URL=ws://localhost:8000/ws/translate
    depends_on:
      - backend
    restart: unless-stopped
